<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mood Duel ⚔️</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --accent: #e040fb;
    --accent2: #00e5ff;
    --text: #f0f0ff;
    --muted: #888aaa;
    --win: #69ff47;
    --lose: #ff4747;
    --tie: #ffd740;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    text-align: center;
    padding: 2rem 1rem 1rem;
    background: linear-gradient(180deg, #1a0a2e 0%, transparent 100%);
  }
  header h1 { font-size: 2.8rem; letter-spacing: 2px; }
  header p  { color: var(--muted); margin-top: .4rem; font-size: .95rem; }

  #lobby, #game {
    width: 100%;
    max-width: 560px;
    padding: 1.5rem;
  }

  .card {
    background: var(--card);
    border: 1px solid #2a2a4a;
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  label { display: block; margin-bottom: .4rem; color: var(--muted); font-size: .85rem; }
  input[type=text] {
    width: 100%;
    padding: .6rem 1rem;
    background: #0f0f1a;
    border: 1px solid #333;
    border-radius: 8px;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border .2s;
  }
  input[type=text]:focus { border-color: var(--accent); }

  .btn {
    display: inline-block;
    padding: .65rem 1.4rem;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--accent2); color: #000; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-row { display: flex; gap: .75rem; margin-top: 1rem; flex-wrap: wrap; }

  #status-bar {
    text-align: center;
    padding: .7rem 1rem;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 10px;
    margin-bottom: 1rem;
    font-size: .95rem;
    min-height: 2.8rem;
    transition: background .3s;
  }

  .scoreboard {
    display: flex;
    justify-content: space-around;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .score-player {
    text-align: center;
    flex: 1;
    padding: 1rem;
    background: var(--card);
    border: 1px solid #2a2a4a;
    border-radius: 14px;
  }
  .score-player .label { color: var(--muted); font-size: .8rem; margin-bottom: .3rem; }
  .score-player .score { font-size: 2.8rem; font-weight: 700; }
  .score-vs { font-size: 1.4rem; color: var(--muted); }
  .player-a .score { color: var(--accent); }
  .player-b .score { color: var(--accent2); }

  .arena {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    min-height: 80px;
    margin-bottom: 1rem;
    font-size: 3.5rem;
  }
  .arena .vs { font-size: 1rem; color: var(--muted); }
  .arena .move { transition: transform .3s; }
  .arena .move.reveal { animation: pop .35s ease; }
  @keyframes pop {
    0%   { transform: scale(0.3) rotate(-20deg); }
    70%  { transform: scale(1.3) rotate(5deg); }
    100% { transform: scale(1) rotate(0); }
  }

  #flavor {
    text-align: center;
    min-height: 1.8rem;
    font-size: 1.05rem;
    color: var(--tie);
    margin-bottom: 1rem;
    font-style: italic;
  }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: .5rem;
    margin-bottom: 1rem;
  }
  .emoji-btn {
    font-size: 1.8rem;
    background: #1a1a2e;
    border: 2px solid #2a2a4a;
    border-radius: 12px;
    padding: .4rem;
    cursor: pointer;
    transition: border .15s, transform .1s, background .15s;
    text-align: center;
  }
  .emoji-btn:hover:not(:disabled) { border-color: var(--accent); background: #22123a; transform: scale(1.12); }
  .emoji-btn:disabled { opacity: .35; cursor: not-allowed; }
  .emoji-btn.selected { border-color: var(--win); background: #1a2e1a; }

  #round-tag {
    text-align: center;
    font-size: .8rem;
    color: var(--muted);
    margin-bottom: .5rem;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  #result-banner {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    min-height: 2rem;
    margin-bottom: .5rem;
  }
  .result-win  { color: var(--win); }
  .result-lose { color: var(--lose); }
  .result-tie  { color: var(--tie); }

  .hidden { display: none !important; }

  footer {
    margin-top: auto;
    padding: 1.5rem;
    color: var(--muted);
    font-size: .8rem;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>⚔️ Mood Duel</h1>
  <p>Two players. Emoji combat. May the best mood win.</p>
</header>

<!-- LOBBY -->
<div id="lobby">
  <div class="card">
    <label>Your name</label>
    <input type="text" id="name-input" placeholder="Enter your name" maxlength="16" />
    <label style="margin-top:1rem">Room code</label>
    <input type="text" id="room-input" placeholder="Leave blank to auto-generate" maxlength="12" />
    <div class="btn-row">
      <button class="btn btn-primary" id="join-btn">Join / Create Room</button>
      <button class="btn btn-secondary" id="random-btn">🎲 Random Room</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <div id="status-bar">Connecting...</div>

  <div class="scoreboard">
    <div class="score-player player-a">
      <div class="label" id="label-a">Player A</div>
      <div class="score" id="score-a">0</div>
    </div>
    <div class="score-vs">VS</div>
    <div class="score-player player-b">
      <div class="label" id="label-b">Player B</div>
      <div class="score" id="score-b">0</div>
    </div>
  </div>

  <div id="round-tag">Round 1</div>

  <div class="arena">
    <span class="move" id="move-a">❓</span>
    <span class="vs">vs</span>
    <span class="move" id="move-b">❓</span>
  </div>

  <div id="result-banner"></div>
  <div id="flavor"></div>

  <div class="emoji-grid" id="emoji-grid"></div>

  <div class="btn-row" style="justify-content:center">
    <button class="btn btn-secondary hidden" id="next-btn">Next Round ▶</button>
    <button class="btn" style="background:#333;color:#aaa" id="leave-btn">Leave Room</button>
  </div>
</div>

<footer>Open two tabs or share the room code with a friend 🌐</footer>

<script>
const EMOJIS = ['🔥','🌊','🌿','💨','🪨','⚡','🎭','😴','😡','😂','🤯','☕','🌙','🎲','🌈'];

let ws, myPlayerID, myName, roomID;

const $ = id => document.getElementById(id);

function buildEmojiGrid() {
  const grid = $('emoji-grid');
  grid.innerHTML = '';
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn';
    btn.textContent = e;
    btn.title = e;
    btn.onclick = () => sendMove(e, btn);
    grid.appendChild(btn);
  });
}

function disableEmojis(selected) {
  document.querySelectorAll('.emoji-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === selected) b.classList.add('selected');
  });
}

function enableEmojis() {
  document.querySelectorAll('.emoji-btn').forEach(b => {
    b.disabled = false;
    b.classList.remove('selected');
  });
}

function sendMove(emoji, btn) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'move', payload: { emoji } }));
  disableEmojis(emoji);
}

function setStatus(msg, color) {
  const bar = $('status-bar');
  bar.textContent = msg;
  bar.style.background = color || '';
}

function revealMove(side, emoji) {
  const el = $('move-' + side);
  el.textContent = emoji;
  el.classList.remove('reveal');
  void el.offsetWidth;
  el.classList.add('reveal');
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws?room=${roomID}`);

  ws.onopen = () => setStatus('Connected. Waiting for opponent...');

  ws.onmessage = evt => {
    const msg = JSON.parse(evt.data);
    const p = msg.payload || {};

    if (msg.type === 'welcome') {
      myPlayerID = p.playerID;
      const side = myPlayerID === 'A' ? 'label-a' : 'label-b';
      const other = myPlayerID === 'A' ? 'label-b' : 'label-a';
      $(side).textContent = myName + ' (You)';
      $(other).textContent = 'Opponent';
    }

    if (msg.type === 'waiting') {
      setStatus('⏳ ' + p.msg);
    }

    if (msg.type === 'start') {
      setStatus('⚔️ ' + p.msg, '#1a2e1a');
      enableEmojis();
      $('move-a').textContent = '❓';
      $('move-b').textContent = '❓';
      $('result-banner').textContent = '';
      $('flavor').textContent = '';
    }

    if (msg.type === 'waiting_move') {
      setStatus('⌛ Waiting for opponent\'s move...');
    }

    if (msg.type === 'result') {
      revealMove('a', p.moveA);
      revealMove('b', p.moveB);
      $('score-a').textContent = p.scoreA;
      $('score-b').textContent = p.scoreB;
      $('round-tag').textContent = `Round ${parseInt(p.round)}`;
      $('flavor').textContent = p.flavor;

      const banner = $('result-banner');
      if (!p.winner) {
        banner.textContent = "🤝 It's a tie!";
        banner.className = 'result-tie';
      } else {
        const iWon = (p.winner === 'a' && myPlayerID === 'A') || (p.winner === 'b' && myPlayerID === 'B');
        banner.textContent = iWon ? '🏆 You win this round!' : '💀 You lose this round!';
        banner.className = iWon ? 'result-win' : 'result-lose';
      }

      setStatus(`Round ${parseInt(p.round) - 1} complete — ready for the next?`);
      $('next-btn').classList.remove('hidden');
    }

    if (msg.type === 'error') {
      setStatus('❌ ' + p.msg, '#2e1a1a');
    }
  };

  ws.onclose = () => setStatus('Disconnected. Refresh to reconnect.');
}

$('join-btn').onclick = () => {
  myName = $('name-input').value.trim() || 'Player';
  roomID = $('room-input').value.trim() || Math.random().toString(36).slice(2,8);
  $('lobby').classList.add('hidden');
  $('game').classList.remove('hidden');
  buildEmojiGrid();
  connect();
  history.replaceState(null, '', '?room=' + roomID);
};

$('random-btn').onclick = () => {
  $('room-input').value = Math.random().toString(36).slice(2,8).toUpperCase();
};

$('next-btn').onclick = () => {
  $('next-btn').classList.add('hidden');
  $('move-a').textContent = '❓';
  $('move-b').textContent = '❓';
  $('result-banner').textContent = '';
  $('flavor').textContent = '';
  enableEmojis();
  setStatus('⚔️ Choose your emoji!', '#1a2e1a');
};

$('leave-btn').onclick = () => {
  if (ws) ws.close();
  $('game').classList.add('hidden');
  $('lobby').classList.remove('hidden');
  history.replaceState(null, '', '/');
};

// Auto-fill room from URL
const urlRoom = new URLSearchParams(location.search).get('room');
if (urlRoom) $('room-input').value = urlRoom;
</script>
</body>
</html>
