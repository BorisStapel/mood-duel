name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  SERVICE_NAME: mood-duel
  IMAGE: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mood-duel/mood-duel

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create service account and grant permissions
        run: |
          SA_NAME="mood-duel-service"
          SA_EMAIL="${SA_NAME}@${PROJECT_ID}.iam.gserviceaccount.com"
          
          # Create service account if it doesn't exist
          gcloud iam service-accounts create $SA_NAME --display-name="Mood Duel Service" 2>/dev/null || true
          
          # Grant minimal permissions (logging only)
          gcloud projects add-iam-policy-binding $PROJECT_ID \
            --member="serviceAccount:${SA_EMAIL}" \
            --role="roles/logging.logWriter" \
            --quiet
          
          echo "SA_EMAIL=${SA_EMAIL}" >> $GITHUB_ENV

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t $IMAGE:$GITHUB_SHA -t $IMAGE:latest .

      - name: Push Docker image
        run: |
          docker push $IMAGE:$GITHUB_SHA
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE:$GITHUB_SHA \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --port 8080 \
            --memory 256Mi \
            --min-instances 0 \
            --max-instances 1 \
            --service-account $SA_EMAIL

